apis:
  - name: Cloud Bigtable Admin API
    description: >-
      The Cloud Bigtable Admin API provides programmatic access to manage Cloud Bigtable instances, clusters, tables,
      and related resources. It enables creating and configuring Bigtable infrastructure, managing column families,
      handling backups, and setting access control policies for high-throughput NoSQL workloads.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
