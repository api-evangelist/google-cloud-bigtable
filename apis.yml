name: Google Cloud Bigtable
description: >-
  Google Cloud Bigtable is a fully managed, scalable NoSQL database service
  designed for large analytical and operational workloads. It offers consistent
  sub-10ms latency and seamless scalability, making it ideal for time-series data,
  IoT, ad tech, fintech, and machine learning applications. Bigtable integrates
  with popular big data tools like Hadoop, Dataflow, and Dataproc.
